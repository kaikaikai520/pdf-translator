<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font: 14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color: #333; background: #f5f7fa; padding: 16px; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
.header { padding: 14px 16px 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.header h2 { font-size: 15px; font-weight: 600; color: #4A90D9; }
.close-btn { cursor: pointer; color: #bbb; font-size: 22px; line-height: 1; background: none; border: none; padding: 0 4px; }
.close-btn:hover { color: #666; }
.body { padding: 14px 16px; max-height: 340px; overflow-y: auto; }
.section { margin-bottom: 14px; }
.section:last-child { margin-bottom: 0; }
.label { font-size: 11px; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.text { white-space: pre-wrap; word-break: break-word; line-height: 1.7; }
.text-original { color: #888; font-size: 13px; }
.text-translated { font-size: 15px; color: #222; }
.footer { padding: 10px 16px 14px; border-top: 1px solid #eee; display: flex; gap: 8px; }
.btn { flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; text-align: center; transition: opacity 0.12s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: #4A90D9; color: #fff; }
.btn-secondary { background: #f0f0f0; color: #333; }
.btn-success { background: #27ae60; color: #fff; }
.toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h2>翻译结果</h2>
    <button class="close-btn" id="closeBtn">&times;</button>
  </div>
  <div class="body">
    <div class="section">
      <div class="label">译文</div>
      <div class="text text-translated" id="translatedText"></div>
    </div>
    <div class="section">
      <div class="label">原文</div>
      <div class="text text-original" id="originalText"></div>
    </div>
  </div>
  <div class="footer">
    <button class="btn btn-primary" id="copyTransBtn">复制译文</button>
    <button class="btn btn-secondary" id="copyOrigBtn">复制原文</button>
    <button class="btn btn-secondary" id="closeBtn2">关闭</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="result.js"></script>
</body>
</html>
